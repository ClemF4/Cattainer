version: '3.8'

services:
  cattainer:
    # Build the image using the Dockerfile in this directory
    build: .
    container_name: Cattainer
    restart: unless-stopped
    
    # Automatically exposes port 5000 on the Pi's IP
    network_mode: host
    
    # Privileged is required for USB hardware access
    privileged: true
    
    # Host passthrough to allow cattainer access to the Coral TPU drivers
    volumes:
      - /dev/bus/usb:/dev/bus/usb
      - /usr/lib/aarch64-linux-gnu/libedgetpu.so.1.0:/usr/lib/aarch64-linux-gnu/libedgetpu.so.1.0
      - /usr/lib/aarch64-linux-gnu/libedgetpu.so.1:/usr/lib/aarch64-linux-gnu/libedgetpu.so.1
      - .:/app
      - ./zones_data:/data
      - /etc/localtime:/etc/localtime:ro

    environment:
        # This is production instead of development since i am using gunicorn now
      - FLASK_ENV=production