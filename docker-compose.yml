services:
  web:
    build: 
      context: ./cattainer-web 
    ports:
      - "5000:5000" 
    volumes:
      - ./cattainer-data:/usr/local/app/data 
      #Map the cattainer-data/static folder into a folder just called static in the app directory since flask only knows how to use /static/
      - ./cattainer-data/static:/usr/local/app/static
    restart: unless-stopped

  core:
    build: 
      context: ./cattainer-core
    volumes:
      - ./cattainer-data:/usr/local/app/data
      - ./cattainer-data/static:/usr/local/app/static
    group_add:
      - "993" #This is the group which controls my gpio pins, as shown by getent group gpio
    devices:
      - "/dev/dma_heap:/dev/dma_heap" #required by picamera2
      - "/dev/media0:/dev/media0" #camera feed
      - "/dev/bus/usb:/dev/bus/usb" #coral TPU
      - "/dev/gpiomem4:/dev/gpiomem4" #GPIO pin mem access
      - "/dev/gpiochip4:/dev/gpiochip4" #GPIO pin device access
    restart: unless-stopped
