version: '3.8'

services:
  cattainer:
    image: cattainer
    container_name: Cattainer
    restart: unless-stopped
    
    # 1. Network: Host mode for Tailscale/HA
    network_mode: host
    
    # 2. Privileges: Required for USB access
    privileged: true
    
    # 3. Standard Volume Mapping
    volumes:
      - /dev/bus/usb:/dev/bus/usb  # Access USB devices
      - .:/app                     # Live Code Editing
      - ./zones_data:/data         # Save Data
      - /etc/localtime:/etc/localtime:ro

    environment:
      - FLASK_ENV=development
      - MQTT_BROKER=100.89.9.59