version: '3.8'

services:
  cattainer:
    image: cattainer
    container_name: Cattainer
    restart: unless-stopped
    
    # 1. Network: Host mode is required for Tailscale/Home Assistant
    network_mode: host
    
    # 2. Privileged: REQUIRED for USB Hardware Access
    privileged: true
    
    # 3. THE "HOST PASSTHROUGH"
    # We map the specific library file from your Pi into the container.
    # This guarantees the container uses the exact same driver version as the host.
    volumes:
      - /dev/bus/usb:/dev/bus/usb
      - /usr/lib/aarch64-linux-gnu/libedgetpu.so.1.0:/usr/lib/aarch64-linux-gnu/libedgetpu.so.1.0
      - /usr/lib/aarch64-linux-gnu/libedgetpu.so.1:/usr/lib/aarch64-linux-gnu/libedgetpu.so.1
      - .:/app
      - ./zones_data:/data
      - /etc/localtime:/etc/localtime:ro

    environment:
      - FLASK_ENV=development
      # Update to your Home Assistant IP
      - MQTT_BROKER=100.89.9.59