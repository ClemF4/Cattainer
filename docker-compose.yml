version: '3.8'

services:
  cattainer:               # <--- Service Name changed
    build: .
    image: cattainer       # <--- Name of the blueprint (Image)
    container_name: Cattainer # <--- Name of the running machine
    restart: unless-stopped
    
    # 1. NETWORK FIX: This lets the container see your Tailscale VPN & Home Assistant
    network_mode: host
    
    # 2. USB ACCESS: Required for Coral Stick
    privileged: true
    devices:
      - /dev/bus/usb:/dev/bus/usb
      - /dev/video0:/dev/video0     #camera
    # Note: 'ports' are removed because 'network_mode: host' opens 
    # port 5000 directly on the Pi's IP automatically.

    volumes:
      - /dev:/dev
      - .:/app               # Live code editing
      - ./zones_data:/data   # Save zone data
      - /etc/localtime:/etc/localtime:ro # Sync time

    environment:
      - FLASK_ENV=development
      # Now you can use the Tailscale IP (e.g., 100.x.x.x)
      - MQTT_BROKER=100.89.9.59